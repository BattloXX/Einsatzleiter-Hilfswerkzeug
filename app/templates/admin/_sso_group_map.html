{% if not config or not config.group_mappings %}
<p style="color:var(--color-text-muted);font-size:.85rem">Noch keine Gruppen-Mappings konfiguriert.</p>
{% else %}
<table class="table table--compact" style="margin-bottom:0">
  <thead>
    <tr>
      <th>Group Object ID</th>
      <th>Bezeichnung</th>
      <th>Rolle</th>
      <th style="width:60px"></th>
    </tr>
  </thead>
  <tbody>
    {% for gm in config.group_mappings %}
    <tr>
      <td><code style="font-size:.82rem">{{ gm.entra_group_id }}</code></td>
      <td>{{ gm.label or '–' }}</td>
      <td><span class="badge">{{ gm.role.label if gm.role else gm.role_id }}</span></td>
      <td>
        <form hx-post="/admin/sso/group-map/{{ gm.id }}/delete"
              {% if org_id %}hx-vals='{"target_org_id": "{{ org_id }}"}'{% endif %}
              hx-headers='{"X-CSRFToken": "{{ request.state.csrf_token if request is defined else "" }}"}'
              hx-target="#sso-group-map-table"
              hx-swap="innerHTML"
              hx-confirm="Mapping loschen?">
          <input type="hidden" name="_csrf" value="{{ request.state.csrf_token if request is defined else '' }}">
          <button type="submit" class="btn btn--ghost btn--sm btn--danger"
                  title="Loschen">&#128465;</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endif %}
