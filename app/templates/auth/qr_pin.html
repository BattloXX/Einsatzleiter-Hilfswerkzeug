<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d42225">
  <title>PIN – {{ brand }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/csrf.js" defer></script>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/img/Logo-rot.png" alt="{{ brand }}"
             onerror="this.style.display='none'" class="login-logo__img">
        <p class="login-logo__sub">{{ brand_tagline }}</p>
      </div>

      {% if incident %}
      <p style="text-align:center; color:var(--text-muted); margin-bottom:4px; font-size:0.85rem;">
        Einsatz {{ incident.alarm_type_code }}
      </p>
      {% endif %}

      <p style="text-align:center; margin-bottom:20px; font-size:1.05rem; font-weight:600;">
        PIN eingeben
      </p>

      {% if error %}
      <p style="text-align:center; color:#f87171; font-size:.88rem; margin-bottom:12px;">
        Falscher PIN – bitte erneut versuchen.
      </p>
      {% endif %}

      <form method="post" action="/qr-pin" class="login-form">
        <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
        <input type="hidden" name="incident_id" value="{{ incident_id }}">
        <div class="form-group">
          <label for="pin">PIN</label>
          <input type="password" id="pin" name="pin" required
                 inputmode="numeric" pattern="[0-9]*" maxlength="16"
                 autocomplete="one-time-code" class="form-input"
                 placeholder="••••" autofocus
                 style="letter-spacing:.3em; text-align:center; font-size:1.4rem;">
        </div>
        <button type="submit" class="btn btn--primary btn--full">Weiter</button>
      </form>
    </div>
  </div>
</body>
</html>
