{# Alarmstufe / Einsatzgrund bearbeiten — HTMX-Fragment (Ziel: #cardDetailBody) #}
<div class="modal__header">
  <div>
    <div class="modal__title">Alarmstufe &amp; Einsatzgrund</div>
    <div class="modal__subtitle">Einsatz #{{ incident.id }}</div>
  </div>
  <button class="modal__close" onclick="document.getElementById('cardDetailModal').close()">✕</button>
</div>
<div class="modal__body">
  <form hx-post="/einsatz/{{ incident.id }}/alarm"
        hx-target="#cardDetailBody"
        hx-swap="innerHTML">
    <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">

    <div class="form-group" style="margin-bottom:1rem">
      <label class="form-label">Alarmstufe</label>
      <select name="alarm_type_code" class="form-input">
        {% for at in alarm_types %}
        <option value="{{ at.code }}" {% if at.code == incident.alarm_type_code %}selected{% endif %}>
          {{ at.code }}{% if at.label %} – {{ at.label }}{% endif %}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group" style="margin-bottom:1.5rem">
      <label class="form-label">Einsatzgrund / Meldung</label>
      <textarea name="report_text" class="form-input" rows="3"
                placeholder="Kurze Beschreibung des Einsatzes…">{{ (incident.reason or incident.report_text or '') }}</textarea>
    </div>

    <div class="modal__footer">
      <button type="button" class="btn btn--ghost"
              onclick="document.getElementById('cardDetailModal').close()">Abbrechen</button>
      <button type="submit" class="btn btn--primary">Speichern</button>
    </div>
  </form>

  <hr style="margin:1.25rem 0; border:0; border-top:1px solid var(--border);">

  <div x-data="{pinSaved: false}">
    <div class="form-group" style="margin-bottom:.5rem">
      <label class="form-label">🔒 QR-Zugang PIN</label>
      <p style="font-size:.8rem; color:var(--text-muted); margin-bottom:.5rem;">
        {% if incident.access_pin_hash %}PIN ist gesetzt.{% else %}Kein PIN – QR-Zugang ohne PIN.{% endif %}
        Leer lassen zum Entfernen.
      </p>
    </div>
    <form hx-post="/einsatz/{{ incident.id }}/pin"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful){pinSaved=true; this.reset();}">
      <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="password" name="pin" class="form-input"
               placeholder="Neuer PIN (max. 16 Zeichen)" maxlength="16"
               inputmode="numeric" style="flex:1;">
        <button type="submit" class="btn btn--secondary btn--sm">PIN setzen</button>
      </div>
      <p x-show="pinSaved" style="color:#22c55e; font-size:.8rem; margin-top:4px;">✓ PIN gespeichert</p>
    </form>
  </div>
</div>
