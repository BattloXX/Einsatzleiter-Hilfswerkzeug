<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Bildschirmschoner – {{ incident.alarm_type_code }} – {{ brand }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    /* Floating container – JS moves this around */
    .ss-float {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      /* size is determined by content; JS reads it after first paint */
    }
    .ss-logo {
      max-width: min(180px, 40vw);
      max-height: 70px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(183,25,33,.5));
    }
    .ss-clock {
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 30px rgba(255,255,255,.15);
    }
    .ss-alarm-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: min(500px, 90vw);
      text-align: center;
    }
    .ss-alarm-badge {
      font-size: 1rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 5px;
      background: #d42225;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .ss-alarm-text {
      font-size: clamp(.85rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,.8);
      line-height: 1.3;
    }
    .ss-back {
      position: fixed;
      top: 12px;
      right: 16px;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.5);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: .75rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 10;
    }
    .ss-back:hover { background: rgba(255,255,255,.18); color:#fff; }
  </style>
</head>
<body>
  <a href="/einsatz/{{ incident.id }}/atemschutz" class="ss-back" id="ssBack">✕ Schließen</a>

  <!-- Silent video: keeps screen awake on browsers without WakeLock support -->
  <video id="ssKeepAlive" autoplay loop muted playsinline
         style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;left:-2px;top:-2px;">
    <!-- 1×1 transparent webm, base64 encoded -->
    <source src="data:video/webm;base64,GkXfowEAAAAAAAAfQoaBAUL3gQFC8oEEQvOBCEKChHdlYm1Ch4ECQoWBAhhTgGcBAAAAAAAUkhFNm3RALE27i1OrhBVJqWZTrIHfTbuMU6uEFlSua1OsggEuVaHmUa6BAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAVSalmAQAAAAAAAEUq17GDD0JATYCNTGF2ZjU4LjEyLjEwMAA" type="video/webm">
  </video>

  <div class="ss-float" id="ssFloat">
    <img class="ss-logo" src="/static/img/logo_einsatzcockpit.png" alt="{{ brand }}">

    <div class="ss-clock" id="ssClock">--:--:--</div>

    <div class="ss-alarm-wrap">
      {% if incident.alarm_type_code %}
      <span class="ss-alarm-badge">{{ incident.alarm_type_code }}</span>
      {% endif %}
      <span class="ss-alarm-text">
        {{ incident.report_text or incident.reason or (incident.address_street ~ ' ' ~ (incident.address_no or '') ~ ', ' ~ (incident.address_city or '')) | trim or '–' }}
      </span>
    </div>
  </div>

  <script>
  // ── Uhrzeit ──────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('ssClock').textContent =
      new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Bouncing position (DVD-Screensaver style) ─────────────────────
  (function () {
    const el = document.getElementById('ssFloat');
    let x = 0, y = 0, vx = 0.4, vy = 0.3;
    let w = 0, h = 0, bw = 0, bh = 0;

    function measure() {
      bw = window.innerWidth;
      bh = window.innerHeight;
      w = el.offsetWidth;
      h = el.offsetHeight;
      // clamp current position so it doesn't go out of bounds after resize
      x = Math.min(x, bw - w);
      y = Math.min(y, bh - h);
    }

    // start from a random position
    function init() {
      measure();
      x = Math.random() * Math.max(0, bw - w);
      y = Math.random() * Math.max(0, bh - h);
      // random speed direction
      const speed = Math.min(bw, bh) * 0.0006;
      const angle = Math.random() * Math.PI * 2;
      vx = Math.cos(angle) * speed;
      vy = Math.sin(angle) * speed;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    }

    let last = null;
    function frame(ts) {
      if (last === null) { last = ts; requestAnimationFrame(frame); return; }
      const dt = Math.min(ts - last, 80); // cap at 80ms to avoid jumps after tab switch
      last = ts;

      x += vx * dt;
      y += vy * dt;

      if (x <= 0)        { x = 0;      vx = Math.abs(vx); }
      if (y <= 0)        { y = 0;      vy = Math.abs(vy); }
      if (x >= bw - w)   { x = bw - w; vx = -Math.abs(vx); }
      if (y >= bh - h)   { y = bh - h; vy = -Math.abs(vy); }

      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', measure);
    // wait for layout so offsetWidth is correct
    requestAnimationFrame(() => { init(); requestAnimationFrame(frame); });
  })();

  // ── Wake Lock (Web Screen Wake Lock API) ─────────────────────────────
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { await navigator.wakeLock.request('screen'); } catch (_) {}
  }
  acquireWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') acquireWakeLock();
  });

  // ── Silent video keep-alive (fallback for browsers without WakeLock) ─
  const vid = document.getElementById('ssKeepAlive');
  if (vid) vid.play().catch(() => {});

  // ── Native Wake Lock über Capacitor-Bridge ──────────────────────────
  if (window.ELNative && window.ELNative.keepAwake) {
    window.ELNative.keepAwake(true);
  }
  window.addEventListener('beforeunload', () => {
    if (window.ELNative && window.ELNative.keepAwake) window.ELNative.keepAwake(false);
  });

  // ── Tap/click anywhere (except back link) → zurück zur Überwachung ───
  document.addEventListener('click', (e) => {
    if (e.target.closest('#ssBack')) return;
    location.href = '/einsatz/{{ incident.id }}/atemschutz';
  });

  // ── WebSocket Live-Update ────────────────────────────────────────────
  const incidentId = {{ incident.id }};
  let ws;
  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/incident/' + incidentId);
    ws.onmessage = function(e) {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'incident_closed') location.href = '/';
        else if (msg.type === 'reload_board' || msg.type === 'incident_leader_changed') location.reload();
        if (msg.type === 'ping') ws.send(JSON.stringify({ type: 'pong' }));
      } catch (_) {}
    };
    ws.onclose = function() { setTimeout(connectWs, 3000); };
  }
  connectWs();
  </script>
</body>
</html>
