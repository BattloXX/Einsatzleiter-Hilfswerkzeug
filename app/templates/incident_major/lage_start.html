{% extends "base.html" %}
{% block title %}Neue Lage starten{% endblock %}

{% block content %}
<div style="max-width:520px;margin:40px auto;padding:0 16px;">
  <div style="margin-bottom:20px;">
    <a href="/lage" class="btn btn--ghost btn--sm">← Zurück</a>
  </div>
  <h2 style="margin-bottom:24px;">Neue Großschadenslage starten</h2>

  <form method="post" action="/lage/neu">
    <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">

    <div class="form-group">
      <label class="form-label">Bezeichnung <span style="color:#ef4444">*</span></label>
      <input type="text" name="name" class="form-input" required maxlength="160"
             placeholder="z. B. Hochwasser Bregenzerach"
             autofocus autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label">Beschreibung (optional)</label>
      <textarea name="description" class="form-input" rows="3" maxlength="2000"
                placeholder="Lagebeschreibung, Einsatzschwerpunkte…"
                style="resize:vertical;"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" name="is_exercise" value="true"
               style="width:16px;height:16px;accent-color:var(--color-primary,#d42225);">
        Übung / Simulation
      </label>
      <p class="form-hint">Übungs-Lagen werden mit einem deutlichen Banner markiert.</p>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px;">
      <a href="/lage" class="btn btn--ghost">Abbrechen</a>
      <button type="submit" class="btn btn--danger">🚨 Lage starten</button>
    </div>
  </form>
</div>
{% endblock %}
