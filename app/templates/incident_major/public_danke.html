<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meldung erhalten</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f3f4f6; color: #111827; min-height: 100vh;
    padding: 16px; display: flex; align-items: center; justify-content: center;
  }
  .card {
    max-width: 440px; width: 100%;
    background: #fff; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    padding: 36px 24px; text-align: center;
  }
  .icon { font-size: 3rem; margin-bottom: 12px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: #15803d; }
  p  { font-size: .9rem; color: #374151; line-height: 1.6; }
  .sub { font-size: .78rem; color: #9ca3af; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Danke für Ihre Meldung!</h1>
  <p>Ihre Meldung wurde erfolgreich übermittelt und wird von der Einsatzleitung geprüft.</p>
  <p class="sub">{{ lage.name }} · {{ brand }}</p>
</div>
</body>
</html>
