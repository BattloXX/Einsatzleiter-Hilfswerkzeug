<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Meldung erhalten</title>
<style>
  :root {
    --bg:#0b1326; --surface:#131b2e; --border:#2e3347;
    --text:#dae2fd; --text-muted:#7a87a8; --green:#18a957;
    --radius-lg:.75rem; --shadow-card:0 1px 2px rgba(0,0,0,.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 16px; display: flex; align-items: center; justify-content: center;
  }
  .card {
    max-width: 440px; width: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
    padding: 40px 24px; text-align: center;
  }
  .icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 72px; height: 72px; border-radius: 999px;
    background: rgba(24,169,87,.15); font-size: 2.6rem; margin-bottom: 16px;
  }
  h1 { font-size: 1.35rem; font-weight: 800; margin-bottom: 10px; color: var(--green); }
  p { font-size: .92rem; color: var(--text); line-height: 1.6; }
  .sub { font-size: .74rem; color: var(--text-muted); margin-top: 22px; letter-spacing: .03em; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Danke für Ihre Meldung!</h1>
  <p>Ihre Meldung wurde erfolgreich übermittelt und wird von der Einsatzleitung geprüft.</p>
  <p class="sub">{{ lage.name }} · {{ brand }}</p>
</div>
</body>
</html>
