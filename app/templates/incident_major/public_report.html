<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meldung abgeben</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f3f4f6; color: #111827; min-height: 100vh;
    padding: 16px;
  }
  .card {
    max-width: 520px; margin: 0 auto;
    background: #fff; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    padding: 24px 20px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header__icon { font-size: 2rem; }
  .header__title { font-size: 1.2rem; font-weight: 700; margin-top: 6px; }
  .header__sub { font-size: .85rem; color: #6b7280; margin-top: 4px; }
  .alert {
    background: #fef9c3; border: 1px solid #fde68a;
    color: #92400e; border-radius: 6px; padding: 10px 12px;
    font-size: .82rem; margin-bottom: 16px;
  }
  label { display: block; font-size: .83rem; font-weight: 600; color: #374151;
    margin-bottom: 4px; margin-top: 14px; }
  label.required::after { content: " *"; color: #ef4444; }
  input, textarea, select {
    width: 100%; padding: 9px 11px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: .9rem; color: #111827;
    background: #fff; outline: none;
  }
  input:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  textarea { resize: vertical; min-height: 90px; }
  .hint { font-size: .75rem; color: #6b7280; margin-top: 4px; }
  .file-label {
    display: inline-block; margin-top: 8px;
    padding: 8px 14px; border: 1px dashed #d1d5db; border-radius: 6px;
    cursor: pointer; font-size: .85rem; color: #3b82f6; text-align: center;
    width: 100%;
  }
  .file-label:hover { background: #eff6ff; }
  #photo-preview { margin-top: 8px; }
  #photo-preview img { max-height: 120px; border-radius: 6px; }
  .btn {
    display: block; width: 100%; margin-top: 20px;
    padding: 12px; border: none; border-radius: 8px;
    background: #ef4444; color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .btn:hover { background: #dc2626; }
  .footer { text-align: center; font-size: .75rem; color: #9ca3af; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header__icon">🚨</div>
    <div class="header__title">Schaden / Gefahr melden</div>
    <div class="header__sub">{{ lage.name }}</div>
  </div>

  {% if lage.is_exercise %}
  <div class="alert">⚠ ÜBUNG / SIMULATION – keine echte Notlage</div>
  {% endif %}

  <form method="post" action="/melden/{{ token }}" enctype="multipart/form-data">
    <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">

    <label class="required">Beschreibung der Situation</label>
    <textarea name="description" required placeholder="Was sehen Sie? Was ist passiert?" maxlength="2000"></textarea>

    <label>Straße / Adresse</label>
    <input type="text" name="strasse" maxlength="160" placeholder="z. B. Hauptstraße 12">

    <label>Ort</label>
    <input type="text" name="ort" maxlength="120" placeholder="z. B. Wolfurt">

    <div style="margin-top:14px;">
      <button type="button" onclick="captureGPS(this)" style="padding:8px 14px;border:1px solid #d1d5db;border-radius:6px;background:#f9fafb;color:#374151;font-size:.85rem;cursor:pointer;">
        📍 Standort ermitteln
      </button>
      <span id="gps-status" style="font-size:.78rem;color:#6b7280;margin-left:8px;"></span>
    </div>
    <input type="hidden" name="lat" id="gps-lat">
    <input type="hidden" name="lng" id="gps-lng">

    <label>Ihr Name (optional)</label>
    <input type="text" name="reporter_name" maxlength="120" placeholder="Vorname Nachname">

    <label>Ihre Telefonnummer (optional)</label>
    <input type="tel" name="reporter_contact" maxlength="120" placeholder="für Rückfragen">

    <label>Foto (optional)</label>
    <label class="file-label" for="photo-input">📷 Foto auswählen / aufnehmen</label>
    <input type="file" name="file" id="photo-input" accept="image/*" capture="environment"
           style="display:none;" onchange="showPreview(this)">
    <div id="photo-preview"></div>
    <p class="hint">Max. 10 MB · wird automatisch komprimiert</p>

    <button type="submit" class="btn">Meldung absenden</button>
  </form>

  <div class="footer">Einsatzleiter-Hilfswerkzeug – Feuerwehr</div>
</div>

<script>
function captureGPS(btn) {
  var status = document.getElementById('gps-status');
  if (!navigator.geolocation) { status.textContent = 'GPS nicht verfügbar'; return; }
  status.textContent = '…';
  btn.disabled = true;
  navigator.geolocation.getCurrentPosition(function(pos) {
    document.getElementById('gps-lat').value = pos.coords.latitude.toFixed(6);
    document.getElementById('gps-lng').value = pos.coords.longitude.toFixed(6);
    status.textContent = '✓ Standort erfasst (' + pos.coords.latitude.toFixed(4) + ', ' + pos.coords.longitude.toFixed(4) + ')';
    status.style.color = '#15803d';
    btn.disabled = false;
  }, function() {
    status.textContent = 'Standort nicht verfügbar';
    btn.disabled = false;
  }, { timeout: 10000, enableHighAccuracy: true });
}
function showPreview(input) {
  var prev = document.getElementById('photo-preview');
  prev.innerHTML = '';
  if (input.files && input.files[0]) {
    var r = new FileReader();
    r.onload = function(e) {
      prev.innerHTML = '<img src="' + e.target.result + '">';
    };
    r.readAsDataURL(input.files[0]);
  }
}
</script>
</body>
</html>
