{% extends "uas/_incident_layout.html" %}
{% block title %}Drohneneinsatz starten – Einsatz #{{ incident.id }}{% endblock %}

{% block uas_content %}
<h2 style="margin:0 0 1rem;font-size:1.15rem;font-weight:700;">&#x1F4E1; Drohneneinsatz anlegen</h2>

<form method="post" class="card" style="max-width:700px">
  <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
  <div class="card-body">

    <div class="form-grid">
      <div class="form-group">
        <label>Alarmierungszeitpunkt</label>
        <input type="datetime-local" name="alarmierung_at" class="form-control"
               value="{{ incident.started_at.strftime('%Y-%m-%dT%H:%M') if incident.started_at else '' }}">
      </div>
      <div class="form-group">
        <label>TETRA-Rufname Drohnenteam</label>
        <input type="text" name="tetra_rufname" class="form-control" maxlength="60" placeholder="z.B. FDWOL-DT1">
        <small class="form-hint">Sprechgruppe gem&auml;&szlig; RL 7.4</small>
      </div>
      <div class="form-group">
        <label>Betreibernummer</label>
        <input type="text" name="betreibernummer" class="form-control" maxlength="100"
               placeholder="A-UAS-…">
      </div>
      <div class="form-group">
        <label>Gesamteinsatzleiter</label>
        <input type="text" name="gesamteinsatzleiter" class="form-control" maxlength="150"
               value="{{ incident.leader_member.full_name if incident.leader_member else '' }}">
      </div>
    </div>

    <div class="form-group">
      <label>Einsatzgrund / Auftrag</label>
      <textarea name="einsatzgrund" class="form-control" rows="3" maxlength="1000"
                placeholder="Aufgabe des Drohnenteams im Einsatz">{{ incident.reason or (incident.report_text[:500] if incident.report_text else '') }}</textarea>
    </div>

    <div class="form-group">
      <label style="display:flex;align-items:flex-start;gap:.5rem;cursor:pointer">
        <input type="checkbox" name="datenschutz_bestaetigt" value="1" style="margin-top:3px;flex-shrink:0">
        <span>Datenschutz-Belehrung (RL&nbsp;4.9/7.7) wurde erteilt &ndash; Aufnahmen nur im Einsatzgebiet,
        Personen soweit m&ouml;glich nicht erfasst
        <span style="color:var(--color-error,#ef4444)">*</span></span>
      </label>
    </div>

  </div>
  <div class="card-footer" style="display:flex;gap:.75rem;padding:1rem 1.25rem;flex-wrap:wrap">
    <button type="submit" class="btn btn--primary">&#x1F4E1; Drohneneinsatz anlegen</button>
    <a href="/einsatz/{{ incident.id }}" class="btn btn--ghost">Abbrechen</a>
  </div>
</form>
{% endblock %}
