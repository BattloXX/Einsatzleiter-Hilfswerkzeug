<div style="padding:0;" x-data='verleihForm({{ sites_data|tojson }}, {{ lage.id }}, {{ artikel_data|tojson }})'>
  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);">
    <strong>Neue Ausleihe</strong>
    <button type="button" class="btn btn--ghost btn--xs" onclick="closeVerleihPanel()">x</button>
  </div>

  <form hx-post="/lage/{{ lage.id }}/verleih/neu"
        hx-target="#verleih-grid"
        hx-swap="beforeend"
        hx-encoding="multipart/form-data"
        hx-on::after-request="closeVerleihPanel()"
        style="padding:14px 16px;display:flex;flex-direction:column;gap:12px;">
    <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">

    <!-- Personen-Daten -->
    <div class="form-group">
      <label class="form-label">Name * <span style="font-size:.72rem;color:var(--text-muted);">(Ausleiher)</span></label>
      <input type="text" name="name" class="form-input" required maxlength="200" autofocus placeholder="Vor- und Nachname">
    </div>
    <div class="form-group">
      <label class="form-label">Adresse</label>
      <input type="text" name="adresse" class="form-input" maxlength="300" placeholder="Strasse, Ort"
             x-model="adresse">
    </div>
    <div class="form-group">
      <label class="form-label">Telefonnummer</label>
      <input type="tel" name="telefon" class="form-input" maxlength="50" placeholder="+43 660 ..."
             x-model="telefon">
    </div>

    <!-- PIN -->
    <div class="vl-panel" style="border-color:rgba(242,176,46,.35);">
      <label class="vl-field-label" style="color:var(--yellow);">
        🔒 PIN <span style="font-weight:400;text-transform:none;color:var(--text-muted);">(optional – fuer Rueckgabe-Abgleich)</span>
      </label>
      <input type="text" name="pin" class="form-input" maxlength="6" pattern="[0-9]*" inputmode="numeric"
             placeholder="z.B. 123456" style="max-width:140px;font-family:'JetBrains Mono',monospace;letter-spacing:.2em;">

      <!-- PIN per SMS senden -->
      <div x-show="telefon.trim()" style="margin-top:10px;">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:.85rem;padding:2px 0;">
          <input type="checkbox" name="send_pin" value="1" style="width:16px;height:16px;flex-shrink:0;margin-top:2px;">
          <span>PIN generieren + per SMS senden
            <span style="display:block;font-size:.72rem;color:var(--text-muted);">Ohne manuellen PIN wird automatisch ein 6-stelliger PIN erstellt.</span>
          </span>
        </label>
      </div>
    </div>

    <!-- Einsatzstelle -->
    <div class="form-group">
      <label class="form-label">Einsatzstelle zuordnen <span style="font-size:.72rem;color:var(--text-muted);">(optional)</span></label>
      <div style="display:flex;gap:6px;align-items:center;">
        <select name="site_id" class="form-select" style="flex:1;" x-ref="siteSelect">
          <option value="">- Keine Zuordnung -</option>
          <template x-for="s in siteList" :key="s.id">
            <option :value="s.id" x-text="s.bezeichnung"></option>
          </template>
        </select>
        <button type="button" class="btn btn--ghost btn--xs" @click="newSiteOpen=true" x-show="!newSiteOpen">+ Neu</button>
      </div>
      <div x-show="newSiteOpen" x-cloak style="margin-top:6px;display:flex;gap:6px;align-items:center;">
        <input type="text" class="form-input form-input--xs" style="flex:1;" x-model="newSiteName"
               placeholder="Bezeichnung der Einsatzstelle" @keydown.enter.prevent="createSite()">
        <button type="button" class="btn btn--primary btn--xs" @click="createSite()"
                :disabled="!newSiteName.trim()">Anlegen</button>
        <button type="button" class="btn btn--ghost btn--xs" @click="newSiteOpen=false;newSiteName=''">x</button>
      </div>
      <div x-show="newSiteError" x-cloak style="font-size:.75rem;color:#f87171;margin-top:4px;" x-text="newSiteError"></div>
    </div>

    <!-- Stuckliste Schnell-Auswahl -->
    {% if stuecklisten %}
    <div class="form-group">
      <label class="form-label">Stuckliste laden</label>
      <select class="form-select" @change="loadStueckliste($event, {{ lage.id }})">
        <option value="">- Stuckliste auswahlen -</option>
        {% for sl in stuecklisten %}
        <option value="{{ sl.id }}">{{ sl.bezeichnung }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}

    <!-- Positionen -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <label class="form-label" style="margin:0;">Artikel * <span style="font-size:.72rem;color:var(--text-muted);">(mind. 1)</span></label>
        <button type="button" class="btn btn--ghost btn--xs" @click="addRow()">+ Artikel</button>
      </div>

      <template x-for="(row, idx) in rows" :key="idx">
        <div style="display:flex;gap:6px;margin-bottom:8px;align-items:flex-start;border:1px solid var(--border);border-radius:8px;padding:8px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <input type="text" class="form-input form-input--xs"
                   placeholder="Bezeichnung *"
                   :name="'pos_bezeichnung[]'"
                   x-model="row.bezeichnung"
                   required
                   list="artikel-datalist">
            <datalist id="artikel-datalist">
              {% for a in artikel %}
              <option value="{{ a.bezeichnung }}"{% if a.artikel_nr %} data-nr="{{ a.artikel_nr }}"{% endif %}>{{ a.artikel_nr or '' }}</option>
              {% endfor %}
            </datalist>
            <!-- Geraetetyp-Position: Artikelauswahl per Dropdown -->
            <template x-if="row.geraetetyp_id">
              <div>
                <div style="font-size:.72rem;color:#60a5fa;margin-bottom:3px;">
                  Geraetetyp: <strong x-text="row.geraetetyp_name"></strong> &ndash; Geraet auswaehlen:
                </div>
                <select class="form-select form-select--xs"
                        @change="onGeraetetypArtikelWahl(idx, $event)"
                        style="width:100%;">
                  <option value="">-- Geraet auswaehlen --</option>
                  <template x-for="ga in row.verfuegbare_artikel" :key="ga.id">
                    <option :value="String(ga.id)"
                            :data-nr="ga.artikel_nr"
                            :data-vfg="ga.verfuegbarkeit"
                            :selected="String(ga.id) === String(row.artikel_id)"
                            x-text="ga.artikel_nr ? ga.artikel_nr + ' ' + ga.bezeichnung : ga.bezeichnung">
                    </option>
                  </template>
                </select>
                <input type="hidden" :name="'pos_artikel_nr[]'" x-model="row.artikel_nr">
                <input type="hidden" :name="'pos_artikel_id[]'" x-model="row.artikel_id">
              </div>
            </template>
            <!-- Normaler Freitext-Modus -->
            <template x-if="!row.geraetetyp_id">
              <div style="display:flex;gap:4px;align-items:center;">
                <input type="text" class="form-input form-input--xs" style="flex:1;"
                       placeholder="Artikelnr"
                       :name="'pos_artikel_nr[]'"
                       x-model="row.artikel_nr"
                       @input="onArtikelNrInput(idx, $event.target.value)">
                <button type="button" class="btn btn--ghost btn--xs" style="padding:3px 7px;font-size:.8rem;"
                        :title="barcodeApiAvailable ? 'Barcode/QR-Code scannen' : 'Kamera-Scan nicht unterstuetzt'"
                        :disabled="!barcodeApiAvailable"
                        @click="triggerScan(idx)">
                  &#128247;
                </button>
                <input type="hidden" :name="'pos_artikel_id[]'" x-model="row.artikel_id">
              </div>
            </template>
            <!-- Verfuegbarkeitswarnung fuer eindeutige ausgeliehene Artikel -->
            <div x-show="row.artikel_id && row.verfuegbarkeit === 'ausgeliehen' && !row.ist_mengenartikel"
                 x-cloak
                 style="font-size:.72rem;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:5px;padding:3px 8px;margin-top:2px;">
              &#9888; Dieser Artikel ist bereits als ausgeliehen markiert
            </div>
            <div style="display:flex;gap:4px;align-items:center;">
              <span style="font-size:.75rem;color:var(--text-muted);flex:1;">Menge</span>
              <button type="button" class="btn btn--ghost btn--xs" style="padding:2px 10px;font-size:.9rem;"
                      @click="row.menge = Math.max(1, Number(row.menge) - 1)"
                      :disabled="!row.ist_mengenartikel && row.artikel_id">-</button>
              <input type="number" class="form-input form-input--xs" style="width:60px;text-align:center;font-weight:600;"
                     :name="'pos_menge[]'"
                     x-model="row.menge"
                     min="1"
                     :readonly="!row.ist_mengenartikel && row.artikel_id"
                     :title="!row.ist_mengenartikel && row.artikel_id ? 'Eindeutiger Artikel: Menge = 1' : ''">
              <button type="button" class="btn btn--ghost btn--xs" style="padding:2px 10px;font-size:.9rem;"
                      @click="row.menge = Number(row.menge) + 1"
                      :disabled="!row.ist_mengenartikel && row.artikel_id">+</button>
            </div>
          </div>
          <button type="button" class="btn btn--danger btn--xs" style="flex-shrink:0;margin-top:2px;" @click="removeRow(idx)">x</button>
        </div>
      </template>
      <button type="button" class="btn btn--ghost btn--xs" @click="addRow()" style="width:100%;">+ Artikel hinzufuegen</button>
    </div>

    <!-- Notizen -->
    <div class="form-group">
      <label class="form-label">Notizen <span style="font-size:.72rem;color:var(--text-muted);">(optional)</span></label>
      <textarea name="notizen" class="form-input" rows="2" style="resize:vertical;font-size:.83rem;" placeholder="Interne Bemerkungen zum Verleih..."></textarea>
    </div>

    <!-- Fotos -->
    <div class="form-group">
      <label class="form-label">Fotos <span style="font-size:.72rem;color:var(--text-muted);">(optional – Beweis beim Ausleihen)</span></label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 10px;border:1px dashed var(--border);border-radius:8px;font-size:.82rem;color:var(--text-muted);">
        <input type="file" name="fotos" accept="image/*" multiple style="display:none;"
               @change="fotoCount = $event.target.files.length">
        &#128247; Fotos aufnehmen / auswahlen
        <span x-show="fotoCount > 0" style="font-size:.8rem;background:rgba(34,197,94,.15);color:#4ade80;padding:1px 8px;border-radius:8px;" x-text="fotoCount + ' Foto(s)'"></span>
      </label>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:4px;">
      <button type="button" class="btn btn--ghost" onclick="closeVerleihPanel()">Abbrechen</button>
      <button type="submit" class="btn btn--primary">Ausleihe anlegen</button>
    </div>
  </form>

  <!-- Live-Scan-Modal (Barcode/QR via Kamera) -->
  <div x-show="scanModalOpen" x-cloak
       style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
    <div style="font-size:.85rem;color:#ccc;margin-bottom:12px;">Barcode / QR-Code vor die Kamera halten</div>
    <video x-ref="scanVideo" autoplay playsinline muted
           style="width:min(90vw,360px);max-height:60vh;border-radius:12px;background:#111;"></video>
    <button type="button" class="btn btn--ghost" style="margin-top:16px;" @click="stopScan()">Abbrechen</button>
  </div>
</div>

<script>
function verleihForm(initialSites, lageId, initialArtikel) {
  return {
    lageId: lageId,
    siteList: initialSites || [],
    artikelList: initialArtikel || [],
    scanIdx: -1,
    scanModalOpen: false,
    scanStream: null,
    newSiteOpen: false,
    newSiteName: '',
    newSiteError: '',
    barcodeApiAvailable: ('BarcodeDetector' in window && !!navigator.mediaDevices && !!navigator.mediaDevices.getUserMedia),
    telefon: '',
    adresse: '',
    fotoCount: 0,
    rows: [{ bezeichnung: '', artikel_nr: '', menge: 1, artikel_id: '', ist_mengenartikel: true, verfuegbarkeit: 'verfuegbar', geraetetyp_id: '', geraetetyp_name: '', verfuegbare_artikel: [] }],
    addRow() {
      this.rows.push({ bezeichnung: '', artikel_nr: '', menge: 1, artikel_id: '', ist_mengenartikel: true, verfuegbarkeit: 'verfuegbar', geraetetyp_id: '', geraetetyp_name: '', verfuegbare_artikel: [] });
    },
    removeRow(i) {
      this.rows.splice(i, 1);
      if (!this.rows.length) this.addRow();
    },
    onArtikelNrInput(idx, val) {
      var match = this.artikelList.find(function(a) { return a.artikel_nr === val; });
      if (match) {
        if (!this.rows[idx].bezeichnung) {
          this.rows[idx].bezeichnung = match.bezeichnung;
        }
        this.rows[idx].artikel_id = String(match.id);
        this.rows[idx].ist_mengenartikel = match.ist_mengenartikel;
        this.rows[idx].verfuegbarkeit = match.verfuegbarkeit || 'verfuegbar';
        if (!match.ist_mengenartikel) this.rows[idx].menge = 1;
      } else {
        this.rows[idx].artikel_id = '';
        this.rows[idx].verfuegbarkeit = 'verfuegbar';
      }
    },
    async loadStueckliste(ev, lageId) {
      var sl_id = ev.target.value;
      if (!sl_id) return;
      try {
        var res = await fetch('/lage/' + lageId + '/verleih/stueckliste/' + sl_id);
        var positionen = await res.json();
        if (positionen.length) {
          var self = this;
          this.rows = positionen.map(function(p) {
            var match = self.artikelList.find(function(a) { return String(a.id) === String(p.artikel_id); });
            return {
              bezeichnung: p.bezeichnung || '',
              artikel_nr: p.artikel_nr || '',
              menge: p.menge || 1,
              artikel_id: p.artikel_id || '',
              ist_mengenartikel: p.ist_mengenartikel !== false,
              verfuegbarkeit: match ? (match.verfuegbarkeit || 'verfuegbar') : 'verfuegbar',
              geraetetyp_id: p.geraetetyp_id || '',
              geraetetyp_name: p.geraetetyp_name || '',
              verfuegbare_artikel: p.verfuegbare_artikel || [],
            };
          });
        }
      } catch(e) { console.error('Stuckliste laden fehlgeschlagen', e); }
      ev.target.value = '';
    },
    onGeraetetypArtikelWahl(idx, ev) {
      var opt = ev.target.selectedOptions[0];
      if (!opt || !opt.value) return;
      this.rows[idx].artikel_id = opt.value;
      this.rows[idx].artikel_nr = opt.dataset.nr || '';
      var match = this.artikelList.find(function(a) { return String(a.id) === opt.value; });
      this.rows[idx].verfuegbarkeit = match ? (match.verfuegbarkeit || 'verfuegbar') : (opt.dataset.vfg || 'verfuegbar');
      this.rows[idx].ist_mengenartikel = false;
      this.rows[idx].menge = 1;
    },
    async createSite() {
      var name = this.newSiteName.trim();
      if (!name) return;
      this.newSiteError = '';
      try {
        var fd = new FormData();
        fd.append('bezeichnung', name);
        fd.append('ort', this.adresse.trim());
        fd.append('_csrf', document.querySelector('[name="_csrf"]').value);
        var res = await fetch('/lage/' + this.lageId + '/verleih/schnell-einsatzstelle', {
          method: 'POST', body: fd
        });
        if (!res.ok) { this.newSiteError = 'Fehler beim Anlegen'; return; }
        var data = await res.json();
        this.siteList.push({ id: data.id, bezeichnung: data.bezeichnung });
        this.$nextTick(function() {
          var sel = this.$refs.siteSelect;
          if (sel) sel.value = String(data.id);
        }.bind(this));
        this.newSiteOpen = false;
        this.newSiteName = '';
      } catch(e) {
        this.newSiteError = 'Verbindungsfehler';
      }
    },
    triggerScan(idx) {
      if (!this.barcodeApiAvailable) return;
      this.scanIdx = idx;
      this.scanModalOpen = true;
      this.$nextTick(function() { this.startScan(); }.bind(this));
    },
    async startScan() {
      try {
        this.scanStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }
        });
        var video = this.$refs.scanVideo;
        video.srcObject = this.scanStream;
        await video.play();
        this._scanLoop();
      } catch(e) {
        this.stopScan();
        alert('Kamera-Zugriff nicht moeglich: ' + e.message);
      }
    },
    async _scanLoop() {
      if (!this.scanModalOpen) return;
      var video = this.$refs.scanVideo;
      if (!video || video.readyState < 2) {
        requestAnimationFrame(this._scanLoop.bind(this));
        return;
      }
      try {
        var det = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','qr_code','data_matrix'] });
        var codes = await det.detect(video);
        if (codes.length > 0) {
          var val = codes[0].rawValue;
          var idx = this.scanIdx;
          this.stopScan();
          if (idx >= 0 && idx < this.rows.length) {
            this.rows[idx].artikel_nr = val;
            var match = this.artikelList.find(function(a) { return a.artikel_nr === val; });
            if (match) {
              this.rows[idx].bezeichnung = match.bezeichnung;
              this.rows[idx].artikel_id = String(match.id);
              this.rows[idx].ist_mengenartikel = match.ist_mengenartikel;
              this.rows[idx].verfuegbarkeit = match.verfuegbarkeit || 'verfuegbar';
              if (!match.ist_mengenartikel) this.rows[idx].menge = 1;
            }
          }
          return;
        }
      } catch(e) { /* weiter scannen */ }
      if (this.scanModalOpen) requestAnimationFrame(this._scanLoop.bind(this));
    },
    stopScan() {
      this.scanModalOpen = false;
      this.scanIdx = -1;
      if (this.scanStream) {
        this.scanStream.getTracks().forEach(function(t) { t.stop(); });
        this.scanStream = null;
      }
    },
  };
}
</script>
