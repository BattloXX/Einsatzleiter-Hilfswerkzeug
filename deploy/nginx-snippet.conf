# CloudPanel NGINX Vhost Snippet – einsatzcockpit.com
# Diese Datei in den "Custom Nginx Config" Block des CloudPanel-Vhosts einfügen.
#
# Schritt 1: CloudPanel → Vhost auf server_name einsatzcockpit.com www.einsatzcockpit.com umstellen.
# Schritt 2: TLS-Zertifikat für einsatzcockpit.com via Let's Encrypt erneuern.
# Schritt 3: Separaten Redirect-Vhost für alte Hosts hinzufügen (unten).
#
# ── Redirect-Block für alte Hosts (als SEPARATEN Vhost in CloudPanel anlegen) ──
# server {
#     listen 80;
#     listen 443 ssl http2;
#     server_name elhw.fwwo.at einsatzleiter.feuerwehr-wolfurt.at einsatz.feuerwehr-wolfurt.at;
#     # SSL-Cert für alte Hosts noch aktiv lassen, sonst keine TLS-Redirect-Möglichkeit
#     return 301 https://einsatzcockpit.com$request_uri;
# }
# HINWEIS: /.well-known/ NICHT redirecten solange Android-TWA noch auf altem Host verankert ist.

# Statische Dateien direkt ausliefern (kein Proxy)
location /static/ {
    alias /home/fwwo-elhw/htdocs/elhw.fwwo.at/app/static/;
    expires 7d;
    add_header Cache-Control "public, immutable";
    gzip_static on;
}

# WebSocket Upgrade (zwingend für /ws/ Endpoints)
location /ws/ {
    proxy_pass http://127.0.0.1:8092;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# Alles andere zur FastAPI-App
location / {
    proxy_pass http://127.0.0.1:8092;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 10m;
}
